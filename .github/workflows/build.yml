name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Deploy FFmpeg Engine
        run: |
          mkdir -p assets
          # 1. 使用 -L 强制跟随 GitHub 的重定向，确保下载的是 70MB+ 的真实二进制文件
          curl -L "https://github.com/vzhivov/ffmpeg-android-maker/releases/download/v6.1/ffmpeg-arm64-v8a" -o assets/ffmpeg
          
          # 2. 赋予初始可执行权限
          chmod +x assets/ffmpeg
          
          # 3. 检查文件大小：如果文件只有几KB，说明下载成了网页，打包必失败
          echo "检查下载结果："
          ls -lh assets/ffmpeg

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK with Flet
        run: |
          pip install flet
          # 4. --yes: 自动回答 Yes，解决你之前的 EOFError
          # 5. --skip-flutter-doctor: 跳过环境检查，防止卡死并提速
          flet build apk --yes --skip-flutter-doctor

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: my-downloader-app
          path: build/apk/*.apk
