name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Deploy FFmpeg
        run: |
          mkdir -p assets
          # 换成这个更通用的链接
          curl -L https://github.com/vzhivov/ffmpeg-android-maker/releases/download/v6.1/ffmpeg-arm64-v8a -o assets/ffmpeg
          chmod +x assets/ffmpeg

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK with Flet
        run: |
          # 确保安装基础依赖
          pip install flet
          # 注意：暂时不装 yt-dlp 试试，看看是不是这个库引起的冲突
          # 如果你的 main.py 里没用到 yt-dlp，先不装它
          flet build apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-downloader-app
          path: build/apk/*.apk
