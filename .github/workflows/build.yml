name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download FFmpeg
        run: |
          mkdir -p assets
          wget -q https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/arm64-v8a-lite.tar.bz2 -O ffmpeg.tar.bz2
          tar -xjf ffmpeg.tar.bz2 -C assets/
          chmod +x assets/ffmpeg
          # 检查文件是否存在
          ls -la assets/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Dependencies
        run: |
          pip install flet==0.82.2
          # 不安装 android 包，它在 Flet 环境中不需要

      - name: Create requirements.txt
        run: |
          echo "flet>=0.82.2" > requirements.txt

      - name: Create AndroidManifest.xml
        run: |
          cat > android_manifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.drmdownloader"
              android:versionCode="1"
              android:versionName="1.0">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <!-- 针对 Android 10+ 的权限 -->
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"
                  tools:ignore="ScopedStorage" 
                  android:minSdkVersion="30" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="DRM下载大师"
                  android:theme="@style/AppTheme"
                  android:requestLegacyExternalStorage="true"
                  android:usesCleartextTraffic="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                          
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <!-- 文件提供者配置 -->
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
              
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
          </manifest>
          EOF

      - name: Create file_paths.xml
        run: |
          mkdir -p res/xml
          cat > res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external" path="." />
              <external-files-path name="external_files" path="." />
              <external-cache-path name="external_cache" path="." />
              <files-path name="files" path="." />
              <cache-path name="cache" path="." />
              <root-path name="root" path="." />
          </paths>
          EOF

      - name: Create main.py
        run: |
          # 这里使用上面的 Python 代码，保存为 main.py
          cat > main.py << 'EOF'
          # 这里粘贴上面的 Python 代码
          EOF
          # 复制上面的 Python 代码到 main.py

      - name: Build APK
        run: |
          flet build apk \
            --build-version=3 \
            --build-number=3 \
            --android-package="com.example.drmdownloader" \
            --android-app-name="DRM下载大师" \
            --android-manifest=android_manifest.xml \
            --resource-dir=res \
            --verbose \
            --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: drm-downloader-apk
          path: build/apk/*.apk
          
      - name: List build files
        run: |
          ls -la build/
          ls -la build/apk/
