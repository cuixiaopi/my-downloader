name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download FFmpeg for Android
        run: |
          mkdir -p assets
          # 使用更直接的下载链接，并增加 -J -L 参数处理重定向
          curl -L https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-android-arm64-v8a-gpl.tar.xz -o ffmpeg.tar.xz
          
          # 尝试使用 xz 和 tar 分步解压，确保兼容性
          sudo apt-get install -y xz-utils
          xz -d ffmpeg.tar.xz
          tar -xvf ffmpeg.tar
          
          # 搜索解压出来的 ffmpeg 二进制文件并移动到 assets
          FFMPEG_PATH=$(find . -name "ffmpeg" -type f | head -n 1)
          cp "$FFMPEG_PATH" assets/ffmpeg
          chmod +x assets/ffmpeg
          echo "FFmpeg 部署路径: $FFMPEG_PATH"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK with Flet
        run: |
          pip install flet yt-dlp
          flet build apk --assets assets

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: my-downloader-app
          path: build/apk/*.apk
