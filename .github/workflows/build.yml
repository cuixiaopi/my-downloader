name: Build Android APK via Flet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🌟 核心修复 1：提前安装官方的 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 🌟 核心修复 2：全自动同意所有的安卓 SDK 协议 (狂按 y)
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet yt-dlp

      - name: Download and Extract FFmpeg
        run: |
          mkdir -p assets
          wget https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/arm64-v8a-full.tar.bz2
          tar -xjf arm64-v8a-full.tar.bz2
          mv ffmpeg assets/ffmpeg
          chmod +x assets/ffmpeg
          rm arm64-v8a-full.tar.bz2

      - name: Build Original APK
        # 现在 Flet 发现 Flutter 已经装好了，协议也同意了，就不会报错了
        run: |
          flet build apk --project "MPD Downloader" --org com.myname.mpddownloader

      - name: Magic Patch for Android 14 (降级 Target SDK 并重签)
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool apksigner zipalign
          
          # 找到打包出来的 APK
          mv build/apk/*.apk original.apk
          
          # 1. 反编译
          apktool d original.apk -o decoded_apk
          
          # 2. 暴力修改 targetSdkVersion 绕过安卓 14 的权限限制
          sed -i "s/targetSdkVersion: .*/targetSdkVersion: '28'/g" decoded_apk/apktool.yml
          
          # 3. 重新打包
          apktool b decoded_apk -o unsigned_patched.apk
          
          # 4. 字节对齐
          zipalign -v -p 4 unsigned_patched.apk patched.apk
          
          # 5. 自动生成签名并签名
          keytool -genkeypair -v -keystore temp.keystore -alias temp -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=MPD,O=Downloader,C=CN"
          apksigner sign --ks temp.keystore --ks-pass pass:123456 patched.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: MPD-Downloader-Android14-Compatible
          path: patched.apk
