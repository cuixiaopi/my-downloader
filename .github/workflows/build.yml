name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 顺便升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 顺便升级到 v5
        with:
          python-version: '3.10'

      - name: Download FFmpeg for Android
        run: |
          mkdir -p assets
          curl -L https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-android-arm64-v8a-gpl.tar.xz -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          find . -name "ffmpeg" -type f -exec cp {} assets/ffmpeg \;
          chmod +x assets/ffmpeg
          echo "FFmpeg 部署完成"

      - name: Setup Java
        uses: actions/setup-java@v4 # 顺便升级到 v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK with Flet
        run: |
          pip install flet yt-dlp
          flet build apk --assets assets

      - name: Upload APK Result
        uses: actions/upload-artifact@v4 # 关键点：这里必须改成 v4
        with:
          name: my-downloader-app
          path: build/apk/*.apk
