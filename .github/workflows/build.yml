name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      # 确保 assets 目录存在，并下载 FFmpeg 二进制
      - name: Prepare FFmpeg (Android ARM64)
        run: |
          mkdir -p assets
          # 下载适用于 Android ARM64 的 FFmpeg 二进制（从 Khang-NT 的仓库）
          wget https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/v6.0/arm64-v8a-lite.tar.bz2
          tar -xjf arm64-v8a-lite.tar.bz2
          mv ffmpeg assets/
          rm arm64-v8a-lite.tar.bz2
      
      # 构建 APK（Flet 会自动处理 assets 目录）
      - name: Build APK
        uses: flet-dev/flet-build-action@v1
        with:
          platform: android
          release: false  # 开发版，方便调试
