name: Build Android APK

on:
  workflow_dispatch:    # 允许手动触发
  push:                 # 推送到main分支时也触发
    branches:
      - main

jobs:
  build-android-apk:    # 作业名称
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          
      - name: Download FFmpeg
        run: |
          mkdir -p assets
          wget -q -O ffmpeg.tar.bz2 "https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/arm64-v8a-lite.tar.bz2"
          tar -xjf ffmpeg.tar.bz2 -C assets/
          chmod +x assets/ffmpeg
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Install Flet
        run: |
          pip install flet==0.19.0
          
      - name: Build APK
        run: |
          echo "开始构建APK..."
          # 使用非交互模式构建
          yes | flet build apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: drm-downloader-apk
          path: build/apk/*.apk
