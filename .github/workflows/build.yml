name: Build Android APK via Flet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4    # 升级到 v4

      - name: Setup Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet yt-dlp

      - name: Download and Extract FFmpeg
        run: |
          mkdir -p assets
          # 1. 下载 ffmpeg 压缩包
          wget https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/arm64-v8a-full.tar.bz2
          # 2. 解压缩文件
          tar -xjf arm64-v8a-full.tar.bz2
          # 3. 移动到 assets 文件夹
          mv ffmpeg assets/ffmpeg
          # 4. 赋予可执行权限
          chmod +x assets/ffmpeg
          # 清理垃圾包
          rm arm64-v8a-full.tar.bz2

      - name: Build APK
        # ⚠️ 极其重要：--target-sdk 28 才能绕过安卓 14 限制
        run: |
          flet build apk --project "MPD Downloader" --org com.myname.mpddownloader --target-sdk 28

      - name: Upload APK
        uses: actions/upload-artifact@v4   # 升级到 v4，解决报错的核心！
        with:
          name: MPD-Downloader-APK
          # v4 版本对路径匹配更严格，直接写文件夹目录即可
          path: build/apk/
