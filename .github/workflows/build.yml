name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Deploy FFmpeg Engine
        run: |
          mkdir -p assets
          # 下载 arm64 架构专用 FFmpeg (适合绝大多数现代安卓手机)
          curl -L https://github.com/vzhivov/ffmpeg-android-maker/releases/download/v6.1/ffmpeg-arm64-v8a -o assets/ffmpeg
          chmod +x assets/ffmpeg

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK with Flet
        run: |
          pip install flet yt-dlp
          # 极简打包命令，避开权限参数错误
          flet build apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: my-downloader-app
          path: build/apk/*.apk
