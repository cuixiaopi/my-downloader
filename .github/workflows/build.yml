name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      
      - name: Debug Information
        run: |
          echo "========== 构建开始 =========="
          echo "当前目录:"
          pwd
          echo "目录内容:"
          ls -la
          echo "Python可用版本:"
          python --version
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"  # 使用 Python 3.9
          
      - name: Create project structure
        run: |
          echo "创建项目结构..."
          mkdir -p assets
          echo "检查main.py是否存在..."
          if [ ! -f "main.py" ]; then
            echo "错误: main.py不存在，请确保文件已上传"
            exit 1
          fi
          
      - name: Download FFmpeg
        run: |
          echo "下载FFmpeg二进制文件..."
          wget -q --show-progress -O ffmpeg.tar.bz2 "https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/arm64-v8a-lite.tar.bz2"
          echo "解压FFmpeg..."
          tar -xjf ffmpeg.tar.bz2 -C assets/
          chmod +x assets/ffmpeg
          echo "FFmpeg信息:"
          ls -lh assets/ffmpeg
          file assets/ffmpeg
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Install Dependencies
        run: |
          echo "安装 Python 依赖..."
          python -m pip install --upgrade pip
          echo "正在安装 flet==0.19.0 ..."
          pip install flet==0.19.0
          
          echo "验证安装:"
          python -c "import flet; print(f'✅ Flet 版本: {flet.__version__}')"
          
      - name: Check Flet CLI
        run: |
          echo "检查 Flet 命令行工具..."
          flet --version || echo "flet 命令不可用"
          
      - name: Create requirements.txt
        run: |
          echo "flet==0.19.0" > requirements.txt
          echo "requirements.txt 内容:"
          cat requirements.txt
          
      - name: Simple Build Test
        run: |
          echo "========== 开始构建 APK =========="
          echo "使用最简单的构建命令..."
          
          # 先查看当前目录
          echo "构建前目录结构:"
          find . -type f -name "*.py" | head -5
          echo "assets目录内容:"
          ls -la assets/
          
          # 最简单的构建命令
          echo "运行: flet build apk"
          echo y | flet build apk
          
          echo "✅ 构建命令执行完成"
          
      - name: Check Build Output
        run: |
          echo "========== 检查构建输出 =========="
          echo "查找 APK 文件:"
          find . -name "*.apk" 2>/dev/null || echo "未找到 APK 文件"
          
          echo "检查 build 目录:"
          if [ -d "build" ]; then
            echo "build 目录结构:"
            ls -la build/
            if [ -d "build/apk" ]; then
              echo "APK 目录内容:"
              ls -la build/apk/
              echo "APK 文件详情:"
              for apk in build/apk/*.apk; do
                echo "APK: $apk"
                ls -lh "$apk"
              done
            fi
          else
            echo "build 目录不存在"
          fi
          
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: drm-downloader-apk
          path: |
            build/apk/*.apk
            *.apk
          retention-days: 7
          
      - name: Upload Source Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-files
          path: |
            main.py
            requirements.txt
            assets/
          retention-days: 3
          
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ github.workspace }}/*.log
            ${{ github.workspace }}/**/*.log
          retention-days: 3
