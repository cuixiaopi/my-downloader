name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Deploy FFmpeg Engine
        run: |
          mkdir -p assets
          # 直接下载 Android 专用的二进制文件，避免解压报错
          curl -L https://github.com/vzhivov/ffmpeg-android-maker/releases/download/v6.1/ffmpeg-arm64-v8a -o assets/ffmpeg
          chmod +x assets/ffmpeg
          echo "FFmpeg 引擎已就位"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK with Flet
        run: |
          pip install flet yt-dlp
          # 修正后的打包命令，不带多余参数
          flet build apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: my-downloader-app
          path: build/apk/*.apk
