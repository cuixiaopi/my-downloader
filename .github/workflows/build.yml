name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"  # 必须用 3.9
          
      - name: Install Flet
        run: |
          pip install flet==0.20.0
          
      - name: Test locally
        run: |
          python -c "import flet; print(f'Flet version: {flet.__version__}')"
          
      - name: Build APK
        run: |
          echo y | flet build apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: drm-downloader
          path: build/apk/*.apk
