name: Build Android APK via Flet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet yt-dlp

      - name: Download and Extract FFmpeg
        run: |
          mkdir -p assets
          wget https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/arm64-v8a-full.tar.bz2
          tar -xjf arm64-v8a-full.tar.bz2
          mv ffmpeg assets/ffmpeg
          chmod +x assets/ffmpeg
          rm arm64-v8a-full.tar.bz2

      - name: Build Original APK
        run: |
          # 动态搜索 Flet 命令路径并执行
          FLET_CMD=$(find /opt/hostedtoolcache/Python/ -name flet | grep bin/flet | head -n 1)
          echo "Using Flet command: $FLET_CMD"
          yes | $FLET_CMD build apk --project "MPD Downloader" --org com.myname.mpddownloader

      - name: Magic Patch for Android 14
        run: |
          sudo apt-get update
          sudo apt-get install -y apksigner zipalign
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          mv build/apk/*.apk original.apk
          java -jar apktool.jar d original.apk -o decoded_apk
          sed -i "s/targetSdkVersion: .*/targetSdkVersion: '28'/g" decoded_apk/apktool.yml
          java -jar apktool.jar b decoded_apk -o unsigned_patched.apk --use-aapt2
          zipalign -v -p 4 unsigned_patched.apk patched.apk
          keytool -genkeypair -v -keystore temp.keystore -alias temp -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=MPD,O=Downloader,C=CN"
          apksigner sign --ks temp.keystore --ks-pass pass:123456 patched.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: MPD-Downloader-Android14-Compatible
          path: patched.apk
